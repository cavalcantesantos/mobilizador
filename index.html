<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Sistema Operacional Estável</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0}
#map{height:500px}
.controls{padding:10px;background:#f2f2f2}
textarea{width:100%;height:120px}
#painel{background:#111;color:#fff;padding:10px;font-weight:bold}
#log{background:#000;color:#00ff00;height:150px;overflow:auto;padding:10px;font-size:12px}
button{margin-top:5px}
</style>
</head>
<body>

<div class="controls">
<h2>Sistema Operacional Público</h2>

Latitude Base:<br>
<input type="number" id="latBase" step="0.000001" value="-15.793889"><br>

Longitude Base:<br>
<input type="number" id="lonBase" step="0.000001" value="-47.882778"><br>

Raio (km):<br>
<input type="number" id="raio" value="50"><br>

CSV (cep,email,lat,lon):<br>
<textarea id="csv"></textarea><br>

<button onclick="iniciar()">Iniciar</button>
<button onclick="gerarPDF()">Gerar Relatório</button>
</div>

<div id="painel">Aguardando...</div>
<div id="map"></div>
<div id="log"></div>

<script>

let dados;

function resetar(){
dados={
processados:0,
dentro:0,
fora:0,
convocados:[],
foraLista:[]
};
}

var map=L.map('map').setView([-15.79,-47.88],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let camada=L.layerGroup().addTo(map);

function icone(cor){
return L.divIcon({
className:'',
html:`<div style="background:${cor};width:16px;height:16px;border-radius:50%;border:2px solid white"></div>`
});
}

function distancia(a,b,c,d){
const R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function log(msg){
document.getElementById("log").innerHTML+=msg+"<br>";
}

function atualizar(){
document.getElementById("painel").innerHTML=
`Processados: ${dados.processados} |
Dentro do raio: ${dados.dentro} |
Fora do raio: ${dados.fora}`;
}

function iniciar(){

resetar();
document.getElementById("log").innerHTML="";
camada.clearLayers();

let latBase=parseFloat(document.getElementById("latBase").value);
let lonBase=parseFloat(document.getElementById("lonBase").value);
let raio=parseFloat(document.getElementById("raio").value);

L.marker([latBase,lonBase],{
icon:icone("blue"),
zIndexOffset:1000
}).addTo(camada);

L.circle([latBase,lonBase],{
radius:raio*1000,
color:"blue",
fill:false
}).addTo(camada);

let linhas=document.getElementById("csv").value.trim().split("\n");

for(let i=1;i<linhas.length;i++){

let [cep,email,lat,lon]=linhas[i].split(",");

lat=parseFloat(lat);
lon=parseFloat(lon);

dados.processados++;

let km=distancia(latBase,lonBase,lat,lon);

if(km<=raio){
dados.dentro++;
dados.convocados.push(`${cep} - ${email}`);
L.marker([lat,lon],{icon:icone("green")}).addTo(camada);
log(`📨 Convocação enviada para ${email}`);
}else{
dados.fora++;
dados.foraLista.push(cep);
L.marker([lat,lon],{icon:icone("red")}).addTo(camada);
log(`⚠ ${cep} fora do raio`);
}

}

atualizar();
log("Operação concluída.");
}

function gerarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("RELATÓRIO OPERACIONAL",10,15);
doc.text(`Processados: ${dados.processados}`,10,30);
doc.text(`Dentro do raio: ${dados.dentro}`,10,36);
doc.text(`Fora do raio: ${dados.fora}`,10,42);

doc.save("relatorio_operacional.pdf");
}

resetar();
atualizar();

</script>
</body>
</html>
