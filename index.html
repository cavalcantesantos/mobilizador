<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Operacional Brasil - Estável Final</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin: 15px; }
#map { height: 500px; margin-top: 15px; }
#log {
    max-height:200px;
    overflow:auto;
    background:#000;
    color:#00ff00;
    padding:10px;
    font-size:12px;
}
input { width: 300px; }
</style>
</head>
<body>

<h2>Sistema Operacional - Brasil</h2>

CEP Principal:<br>
<input type="text" id="principal" placeholder="Ex: 70040-010"><br><br>

Raio (km):<br>
<input type="number" id="raio" value="100"><br><br>

CSV (CEP,Email):<br>
<input type="file" id="arquivo"><br><br>

<button onclick="processar()">Iniciar Operação</button>

<h3 id="status"></h3>

<div id="map"></div>

<h3>Log Operacional</h3>
<div id="log"></div>

<script>

let map = L.map('map').setView([-15.793889, -47.882778], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let layer = L.layerGroup().addTo(map);

function log(msg){
    const div = document.getElementById("log");
    div.innerHTML += msg + "<br>";
    div.scrollTop = div.scrollHeight;
}

async function geocodificarCEP(cep){

    cep = cep.replace(/\D/g,"");

    if(cep.length !== 8){
        return { invalido:true };
    }

    try{
        const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const dados = await resp.json();

        if(dados.erro){
            return { invalido:true };
        }

        // tenta endereço completo
        const consulta1 = `${dados.logradouro || ""}, ${dados.localidade}, ${dados.uf}, Brasil`;
        const url1 = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=br&q=${encodeURIComponent(consulta1)}`;
        const r1 = await fetch(url1);
        const j1 = await r1.json();

        if(j1.length > 0){
            return {
                lat: parseFloat(j1[0].lat),
                lon: parseFloat(j1[0].lon),
                fallback:false,
                invalido:false
            };
        }

        // fallback por cidade
        const consulta2 = `${dados.localidade}, ${dados.uf}, Brasil`;
        const url2 = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=br&q=${encodeURIComponent(consulta2)}`;
        const r2 = await fetch(url2);
        const j2 = await r2.json();

        if(j2.length > 0){
            return {
                lat: parseFloat(j2[0].lat),
                lon: parseFloat(j2[0].lon),
                fallback:true,
                invalido:false
            };
        }

        return { invalido:true };

    }catch(e){
        return { invalido:true };
    }
}

async function processar(){

    layer.clearLayers();
    document.getElementById("log").innerHTML="";
    document.getElementById("status").innerHTML="Processando...";

    const cepPrincipal = document.getElementById("principal").value.trim();
    const raio = parseFloat(document.getElementById("raio").value);
    const arquivo = document.getElementById("arquivo").files[0];

    if(!cepPrincipal || !arquivo){
        alert("Preencha CEP principal e CSV.");
        return;
    }

    const centro = await geocodificarCEP(cepPrincipal);

    if(!centro || centro.invalido){
        alert("CEP principal inválido.");
        return;
    }

    // MARCADOR PRINCIPAL (AZUL)
    L.marker([centro.lat, centro.lon])
        .addTo(layer)
        .bindPopup("📍 CEP Principal")
        .openPopup();

    L.circle([centro.lat, centro.lon],{
        radius: raio * 1000,
        color:"blue",
        fillOpacity:0.05
    }).addTo(layer);

    map.setView([centro.lat, centro.lon], 9);

    const texto = await arquivo.text();
    const linhas = texto.split("\n").map(l=>l.trim()).filter(l=>l!="");

    let processados=0;
    let convocados=0;

    for(const linha of linhas){

        if(linha.toLowerCase().includes("cep")) continue;

        const partes = linha.split(",");
        if(partes.length<2) continue;

        const cep = partes[0].trim();
        const email = partes[1].trim();

        processados++;

        const coords = await geocodificarCEP(cep);

        if(!coords || coords.invalido){

            log(`❌ CEP INVÁLIDO/NÃO LOCALIZADO: ${cep}`);

            L.circleMarker(map.getCenter(),{
                radius:8,
                fillColor:"gray",
                color:"#000",
                fillOpacity:0.9
            }).addTo(layer)
              .bindPopup(`CEP INVÁLIDO: ${cep}`);

            continue;
        }

        const distancia = map.distance(
            [centro.lat,centro.lon],
            [coords.lat,coords.lon]
        )/1000;

        let cor;

        if(distancia <= raio){

            convocados++;

            cor = coords.fallback ? "yellow" : "green";

            log(`📨 ${email} → Você está sendo convocado. Apresente-se no ponto do CEP principal ${cepPrincipal}.`);

        } else {

            cor = coords.fallback ? "orange" : "red";
        }

        L.circleMarker([coords.lat,coords.lon],{
            radius:8,
            fillColor:cor,
            color:"#000",
            fillOpacity:0.9
        }).addTo(layer)
          .bindPopup(`${cep} - ${distancia.toFixed(2)} km`);
    }

    document.getElementById("status").innerHTML =
        `Processados: ${processados} | Convocados: ${convocados}`;
}

</script>

</body>
</html>
