<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mobilizador</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin:0; }
#topo { background:#0b3d6b; color:white; padding:10px; }
#container { display:flex; }
#painel {
    width:300px;
    padding:10px;
    background:#f4f4f4;
}
#map { height:90vh; flex:1; }

input, textarea { width:100%; margin-bottom:5px; }

button {
    width:100%;
    padding:8px;
    margin-top:5px;
    background:#0b3d6b;
    color:white;
    border:none;
    cursor:pointer;
}

#log {
    background:black;
    color:#00ff88;
    height:150px;
    overflow:auto;
    padding:5px;
    font-size:12px;
}
</style>
</head>

<body>

<div id="topo">Sistema Operacional Institucional</div>

<div id="container">

<div id="painel">
<h3>Configuração</h3>

Latitude Base:
<input id="latBase" value="-15.8129">

Longitude Base:
<input id="lonBase" value="-47.9126">

Raio (km):
<input id="raio" value="10">

CSV:
<textarea id="csv">
João,joao@email.com,70000-000
Maria,maria@email.com,-15.82,-47.90
Pedro,pedro@email.com,Brasília DF
</textarea>

<button onclick="iniciar()">Iniciar</button>

<h3>Resultado</h3>
Processados: <span id="proc">0</span><br>
Dentro: <span id="dentro">0</span><br>
Fora: <span id="fora">0</span>

<h3>Log</h3>
<div id="log"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([-15.8129, -47.9126], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

function log(msg){
    document.getElementById("log").innerHTML += msg+"<br>";
}

function haversine(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function geocodeCEP(cep){
    try{
        let via = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        let data = await via.json();

        let endereco = `${data.logradouro} ${data.localidade} ${data.uf}`;

        let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${endereco}`);
        let geoData = await geo.json();

        if(geoData.length > 0){
            return [parseFloat(geoData[0].lat), parseFloat(geoData[0].lon)];
        }

    }catch(e){
        log("Erro CEP: "+cep);
    }
    return null;
}

async function geocodeEndereco(end){
    try{
        let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${end}`);
        let data = await geo.json();

        if(data.length > 0){
            return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        }

    }catch(e){
        log("Erro endereço");
    }
    return null;
}

async function iniciar(){

    document.getElementById("proc").innerText = 0;
    document.getElementById("dentro").innerText = 0;
    document.getElementById("fora").innerText = 0;
    document.getElementById("log").innerHTML = "";

    let latBase = parseFloat(document.getElementById("latBase").value);
    let lonBase = parseFloat(document.getElementById("lonBase").value);
    let raio = parseFloat(document.getElementById("raio").value);

    L.marker([latBase, lonBase]).addTo(map).bindPopup("Base");

    let linhas = document.getElementById("csv").value.split("\n");

    let proc=0, dentro=0, fora=0;

    for(let linha of linhas){

        if(!linha.trim()) continue;

        let partes = linha.split(",");

        let nome = partes[0];
        let lat = null;
        let lon = null;

        log("Processando: "+nome);

        // PRIORIDADE 1: LAT LON
        if(partes.length >= 4){
            lat = parseFloat(partes[2]);
            lon = parseFloat(partes[3]);
        }

        // PRIORIDADE 2: CEP
        else if(partes[2].match(/^\d{5}-?\d{3}$/)){
            let coord = await geocodeCEP(partes[2]);
            if(coord){
                lat = coord[0];
                lon = coord[1];
            }
        }

        // PRIORIDADE 3: ENDEREÇO
        else{
            let coord = await geocodeEndereco(partes[2]);
            if(coord){
                lat = coord[0];
                lon = coord[1];
            }
        }

        if(lat && lon){

            let dist = haversine(latBase, lonBase, lat, lon);

            let cor = dist <= raio ? "green" : "red";

            if(dist <= raio) dentro++;
            else fora++;

            L.circleMarker([lat, lon], {
                color: cor
            }).addTo(map)
            .bindPopup(`${nome}<br>${dist.toFixed(2)} km`);

            log(`OK: ${nome} (${dist.toFixed(2)} km)`);

        }else{
            log("ERRO ao localizar: "+nome);
        }

        proc++;

        document.getElementById("proc").innerText = proc;
        document.getElementById("dentro").innerText = dentro;
        document.getElementById("fora").innerText = fora;
    }

    log("Finalizado.");

}

</script>

</body>
</html>
