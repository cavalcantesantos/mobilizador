<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mobilizador Profissional</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; }
#topo { background:#0b3d6b; color:white; padding:10px; }
#container { display:flex; }
#painel { width:300px; padding:10px; background:#f4f4f4; }
#map { height:90vh; flex:1; }

input, textarea { width:100%; margin-bottom:5px; }

button {
    width:100%;
    padding:8px;
    margin-top:5px;
    background:#0b3d6b;
    color:white;
    border:none;
}

#log {
    background:black;
    color:#00ff88;
    height:150px;
    overflow:auto;
    padding:5px;
    font-size:12px;
}
</style>
</head>

<body>

<div id="topo">Sistema Operacional Institucional</div>

<div id="container">

<div id="painel">

<h3>Configuração</h3>

Latitude Base:
<input id="latBase" value="-15.8129">

Longitude Base:
<input id="lonBase" value="-47.9126">

Raio (km):
<input id="raio" value="10">

CSV:
<textarea id="csv">
João,joao@email.com,70070-350
Maria,maria@email.com,-15.82,-47.90
Pedro,pedro@email.com,Brasília DF
</textarea>

<button onclick="iniciar()">Iniciar</button>
<button onclick="gerarPDF()">Gerar PDF</button>

<h3>Resultado</h3>
Processados: <span id="proc">0</span><br>
Dentro: <span id="dentro">0</span><br>
Fora: <span id="fora">0</span>

<h3>Log</h3>
<div id="log"></div>

</div>

<div id="map"></div>

</div>

<script>
emailjs.init("SUA_PUBLIC_KEY"); // <-- COLOQUE AQUI

let map = L.map('map').setView([-15.8129, -47.9126], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let resultados = [];

function log(msg){
    document.getElementById("log").innerHTML += msg+"<br>";
}

function haversine(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function geocodeEndereco(end){
    let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${end}`);
    let data = await geo.json();
    if(data.length > 0){
        return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }
    return null;
}

async function iniciar(){

    resultados = [];
    document.getElementById("log").innerHTML = "";

    let latBase = parseFloat(latBase.value);
    let lonBase = parseFloat(lonBase.value);
    let raio = parseFloat(raio.value);

    L.marker([latBase, lonBase]).addTo(map).bindPopup("Base");

    // DESENHA RAIO
    L.circle([latBase, lonBase], {
        radius: raio * 1000,
        color: "blue",
        fillOpacity: 0.1
    }).addTo(map);

    let linhas = csv.value.split("\n");

    let proc=0, dentro=0, fora=0;

    for(let linha of linhas){

        if(!linha.trim()) continue;

        let p = linha.split(",");

        let nome = p[0];
        let email = p[1];
        let lat=null, lon=null;

        if(p.length >= 4){
            lat = parseFloat(p[2]);
            lon = parseFloat(p[3]);
        } else {
            let coord = await geocodeEndereco(p[2]);
            if(coord){
                lat = coord[0];
                lon = coord[1];
            }
        }

        if(lat && lon){

            let dist = haversine(latBase, lonBase, lat, lon);
            let dentroRaio = dist <= raio;

            if(dentroRaio){
                dentro++;

                // ENVIO DE EMAIL
                emailjs.send("SEU_SERVICE_ID", "SEU_TEMPLATE_ID", {
                    to_email: email,
                    message: "Você foi convocado. Apresente-se no local indicado nesse email."
                });

            } else {
                fora++;
            }

            L.circleMarker([lat, lon], {
                color: dentroRaio ? "green" : "red"
            }).addTo(map);

            resultados.push({
                nome, email, dist: dist.toFixed(2),
                status: dentroRaio ? "Dentro" : "Fora"
            });

        } else {
            log("Erro: "+nome);
        }

        proc++;

        procSpan.innerText = proc;
        dentroSpan.innerText = dentro;
        foraSpan.innerText = fora;
    }

    log("Finalizado.");
}

function gerarPDF(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let y = 10;

    doc.text("Relatório de Mobilização", 10, y);
    y+=10;

    resultados.forEach(r => {
        doc.text(`${r.nome} | ${r.email} | ${r.dist} km | ${r.status}`, 10, y);
        y+=7;
    });

    doc.save("relatorio.pdf");
}

</script>

</body>
</html>
