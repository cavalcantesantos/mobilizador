<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Sistema Operacional Institucional</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',Roboto;background:#eef1f5}
.topbar{background:#0b3d6d;color:#fff;padding:15px;font-size:18px}
.container{display:grid;grid-template-columns:320px 1fr;gap:20px;padding:20px}
.card{background:#fff;padding:15px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:15px}
.kpis{display:flex;gap:15px;margin-bottom:15px}
.kpi{flex:1;background:#fff;padding:15px;border-radius:8px;text-align:center}
#map{height:500px;border-radius:8px}
#log{background:#111;color:#0f0;padding:10px;height:150px;overflow:auto;font-family:monospace;font-size:12px}
button{padding:8px;background:#0b3d6d;color:#fff;border:none;border-radius:4px;cursor:pointer}
button:hover{background:#145ea8}
input,textarea{width:100%;margin-bottom:8px;padding:6px}
</style>
</head>

<body>

<div class="topbar">Sistema Operacional Institucional</div>

<div class="container">

<div>

<div class="card">
<h3>Configuração</h3>

Latitude Base
<input id="latBase" value="-15.793889">

Longitude Base
<input id="lonBase" value="-47.882778">

Raio (km)
<input id="raio" value="50">

CSV (cep,email,lat,lon)
<textarea id="csv"></textarea>

<button onclick="iniciarSeguro()">Iniciar</button>
<button onclick="sistema.gerarPDF()">PDF</button>
</div>

<div class="card">
<h3>Log</h3>
<div id="log"></div>
</div>

</div>

<div>

<div class="kpis">
<div class="kpi"><h2 id="kpiProcessados">0</h2><span>Processados</span></div>
<div class="kpi"><h2 id="kpiDentro">0</h2><span>Dentro</span></div>
<div class="kpi"><h2 id="kpiFora">0</h2><span>Fora</span></div>
</div>

<div id="map"></div>

</div>

</div>

<script>

const ORS_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImZjNDJjYWM2ZDYxMzQxNjhiODgyMDQ0OGMzMWY5YWU1IiwiaCI6Im11cm11cjY0In0=";

class Sistema{

constructor(){
this.map=L.map('map').setView([-15.79,-47.88],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);

this.layer=L.layerGroup().addTo(this.map);

this.cache=JSON.parse(localStorage.getItem("cacheCEP")||"{}");
}

reset(){
this.data={processados:0,dentro:0,fora:0};
this.layer.clearLayers();
document.getElementById("log").innerHTML="";
}

log(msg){
let l=document.createElement("div");
l.textContent=msg;
document.getElementById("log").appendChild(l);
}

update(){
kpiProcessados.textContent=this.data.processados;
kpiDentro.textContent=this.data.dentro;
kpiFora.textContent=this.data.fora;
}

async geo(cep){
if(this.cache[cep]) return this.cache[cep];

try{
let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cep},Brasil`);
let j=await r.json();
if(j.length){
let c={lat:+j[0].lat,lon:+j[0].lon};
this.cache[cep]=c;
localStorage.setItem("cacheCEP",JSON.stringify(this.cache));
return c;
}
}catch{}
return null;
}

async rota(a,b){
try{
let r=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
Authorization:ORS_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
coordinates:[[a.lon,a.lat],[b.lon,b.lat]]
})
});
let j=await r.json();
return j.routes[0].summary.distance/1000;
}catch{
return null;
}
}

async processar(){

this.reset();

let base={
lat:+latBase.value,
lon:+lonBase.value
};

let raio=+raio.value;

L.marker([base.lat,base.lon]).addTo(this.layer);

let linhas=csv.value.trim().split("\n");

for(let linha of linhas){

let p=linha.split(",");
if(p.length<2) continue;

let cep=p[0].trim();
let lat=parseFloat(p[2]);
let lon=parseFloat(p[3]);

this.data.processados++;

let coord=null;

if(!isNaN(lat)&&!isNaN(lon)){
coord={lat,lon};
}else{
this.log("Buscando "+cep);
coord=await this.geo(cep);
}

if(!coord){
this.log("Erro "+cep);
continue;
}

let d=await this.rota(base,coord);

if(d==null){
this.log("Erro rota "+cep);
continue;
}

if(d<=raio){
this.data.dentro++;
L.marker([coord.lat,coord.lon]).addTo(this.layer);
this.log("Dentro "+cep+" ("+d.toFixed(1)+" km)");
}else{
this.data.fora++;
L.marker([coord.lat,coord.lon],{opacity:0.5}).addTo(this.layer);
this.log("Fora "+cep+" ("+d.toFixed(1)+" km)");
}

await new Promise(r=>setTimeout(r,250));
}

this.update();

this.map.fitBounds(this.layer.getBounds());

this.log("Finalizado");

}

gerarPDF(){
const{jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Relatório",10,10);
doc.text("Processados: "+this.data.processados,10,20);
doc.text("Dentro: "+this.data.dentro,10,30);
doc.text("Fora: "+this.data.fora,10,40);
doc.save("relatorio.pdf");
}

}

const sistema=new Sistema();

async function iniciarSeguro(){
await sistema.processar();
}

</script>

</body>
</html>
