<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sistema Operacional Avançado - Brasil</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin: 0; padding: 0; }
#map { height: 600px; }
.controls { padding: 10px; background: #f0f0f0; }
textarea { width: 100%; height: 100px; }
input { margin: 5px 0; }

#painel {
    background:#222;
    color:white;
    padding:10px;
    font-weight:bold;
}

#log {
    background: black;
    color: #00ff00;
    padding: 10px;
    height: 180px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="controls">
<h2>Sistema Operacional Avançado - Brasil</h2>

<label>CEP Principal:</label><br>
<input type="text" id="cepPrincipal"><br>

<label>Raio (km):</label><br>
<input type="number" id="raio" value="50"><br>

<label>CSV (CEP,email):</label><br>
<textarea id="csv"></textarea><br>

<button onclick="iniciar()">Iniciar Operação</button>
</div>

<div id="painel">
Aguardando operação...
</div>

<div id="map"></div>
<div id="log"></div>

<script>

var map = L.map('map').setView([-15.7801, -47.9292], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var camadaMarcadores = L.layerGroup().addTo(map);
var camadaCirculo = L.layerGroup().addTo(map);

function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
}

function atualizarPainel(dados){
    document.getElementById("painel").innerHTML = `
    CEPs Processados: ${dados.processados} |
    Localizados: ${dados.localizados} |
    Dentro do Raio: ${dados.dentro} |
    Fora do Raio: ${dados.fora} |
    Convocados: ${dados.convocados}
    `;
}

function criarIcone(cor){
    return L.divIcon({
        className: '',
        html: `<div style="
            background:${cor};
            width:20px;
            height:20px;
            border-radius:50%;
            border:3px solid white;
        "></div>`
    });
}

async function geocode(endereco){
    let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;
    let res = await fetch(url);
    let data = await res.json();
    if(data.length > 0){
        return {
            lat: parseFloat(data[0].lat),
            lon: parseFloat(data[0].lon)
        };
    }
    return null;
}

async function localizarCEP(cep){
    try{
        let via = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        let dados = await via.json();
        if(dados.erro) return {status:"nao_localizado"};

        let tentativas = [];

        if(dados.logradouro)
            tentativas.push(`${dados.logradouro}, ${dados.localidade} - ${dados.uf}, Brasil`);

        if(dados.bairro)
            tentativas.push(`${dados.bairro}, ${dados.localidade} - ${dados.uf}, Brasil`);

        tentativas.push(`${dados.localidade} - ${dados.uf}, Brasil`);

        for(let endereco of tentativas){
            let geo = await geocode(endereco);
            if(geo){
                let aproximado =
                    !dados.logradouro ||
                    cep.endsWith("000") ||
                    cep.endsWith("900");

                return {
                    lat: geo.lat,
                    lon: geo.lon,
                    status: aproximado ? "aproximado" : "exato"
                };
            }
        }

        return {status:"nao_localizado"};

    } catch(e){
        return {status:"nao_localizado"};
    }
}

function calcularDistancia(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

async function iniciar(){

    document.getElementById("log").innerHTML = "";
    camadaMarcadores.clearLayers();
    camadaCirculo.clearLayers();

    let estat = {
        processados:0,
        localizados:0,
        dentro:0,
        fora:0,
        convocados:0
    };

    let cepPrincipal = document.getElementById("cepPrincipal").value.trim();
    let raio = parseFloat(document.getElementById("raio").value);
    let linhas = document.getElementById("csv").value.trim().split("\n");

    let principal = await localizarCEP(cepPrincipal);

    if(principal.status === "nao_localizado"){
        log("CEP Principal não localizado.");
        return;
    }

    let centro = [principal.lat, principal.lon];
    map.setView(centro, 11);

    L.marker(centro, {icon: criarIcone("blue")})
        .bindPopup("CEP Principal")
        .addTo(camadaMarcadores);

    L.circle(centro, {
        radius: raio * 1000,
        color: "blue",
        fill:false
    }).addTo(camadaCirculo);

    for(let linha of linhas){

        if(!linha.includes(",")) continue;

        estat.processados++;

        let partes = linha.split(",");
        let cep = partes[0].trim();
        let email = partes[1].trim();

        let ponto = await localizarCEP(cep);

        if(ponto.status === "nao_localizado"){
            log("CEP não localizado: " + cep);
            continue;
        }

        estat.localizados++;

        let distancia = calcularDistancia(
            principal.lat, principal.lon,
            ponto.lat, ponto.lon
        );

        let cor;

        if(distancia <= raio){
            estat.dentro++;
            estat.convocados++;
            cor = ponto.status === "aproximado" ? "yellow" : "green";
            log("CONVOCADO → " + cep + " | " + distancia.toFixed(2) + " km");
            log("Mensagem enviada para " + email);
        } else {
            estat.fora++;
            cor = "red";
            log("FORA DO RAIO → " + cep + " | " + distancia.toFixed(2) + " km");
        }

        L.marker([ponto.lat, ponto.lon], {icon: criarIcone(cor)})
            .bindPopup(`CEP: ${cep}<br>${distancia.toFixed(2)} km`)
            .addTo(camadaMarcadores);
    }

    atualizarPainel(estat);
    log("Operação concluída.");
}

</script>

</body>
</html>
