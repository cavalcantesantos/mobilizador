<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mobilizador Blindado</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; }
#topo { background:#0b3d6b; color:white; padding:10px; }
#container { display:flex; }
#painel { width:300px; padding:10px; background:#f4f4f4; }
#map { height:90vh; flex:1; }

input, textarea { width:100%; margin-bottom:5px; }

button {
    width:100%;
    padding:8px;
    margin-top:5px;
    background:#0b3d6b;
    color:white;
    border:none;
}

#log {
    background:black;
    color:#00ff88;
    height:150px;
    overflow:auto;
    padding:5px;
    font-size:12px;
}

.leaflet-tooltip {
    background: black;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div id="topo">Sistema Operacional Institucional</div>

<div id="container">

<div id="painel">

<h3>Configuração</h3>

Latitude Base:
<input id="latBase" value="-15.8129">

Longitude Base:
<input id="lonBase" value="-47.9126">

Raio (km):
<input id="raio" value="10">

<label><input type="checkbox" id="usarEmail"> Ativar envio de email</label>

CSV:
<textarea id="csv">
João,teste@email.com,70070-350
Maria,teste@email.com,-15.82,-47.90
Pedro,teste@email.com,Brasília DF
</textarea>

<button onclick="iniciar()">Iniciar</button>
<button onclick="gerarPDF()">Gerar PDF</button>

<h3>Resultado</h3>
Processados: <span id="proc">0</span><br>
Dentro: <span id="dentro">0</span><br>
Fora: <span id="fora">0</span>

<h3>Log</h3>
<div id="log"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const EMAIL_CONFIG = {
    publicKey: "SUA_PUBLIC_KEY",
    serviceID: "SEU_SERVICE_ID",
    templateID: "SEU_TEMPLATE_ID"
};

let emailAtivo = false;
let resultados = [];

let map = L.map('map').setView([-15.8129, -47.9126], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function log(msg){
    document.getElementById("log").innerHTML += msg+"<br>";
}

function haversine(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function geocode(end){
    try{
        let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${end}`);
        let data = await geo.json();
        if(data.length > 0){
            return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        }
    } catch(e){
        log("Erro geocoding");
    }
    return null;
}

function iniciarEmail(){
    try{
        if(document.getElementById("usarEmail").checked){
            emailAtivo = true;

            if(typeof emailjs !== "undefined"){
                emailjs.init(EMAIL_CONFIG.publicKey);
                log("EmailJS ativo");
            }else{
                log("EmailJS não carregado");
                emailAtivo = false;
            }
        }else{
            emailAtivo = false;
            log("Email desativado");
        }
    }catch(e){
        log("Falha ao iniciar email");
        emailAtivo = false;
    }
}

async function enviarEmail(nome, email){
    if(!emailAtivo) return;

    try{
        await emailjs.send(
            EMAIL_CONFIG.serviceID,
            EMAIL_CONFIG.templateID,
            {
                to_email: email,
                message: "Você foi convocado. Apresente-se no local indicado nesse email."
            }
        );
        log("Email enviado: " + nome);
    }catch(e){
        log("Erro email: " + nome);
    }
}

async function iniciar(){

    resultados = [];
    document.getElementById("log").innerHTML = "";

    iniciarEmail();

    let latBase = parseFloat(document.getElementById("latBase").value);
    let lonBase = parseFloat(document.getElementById("lonBase").value);
    let raio = parseFloat(document.getElementById("raio").value);

    map.eachLayer(layer => {
        if(layer instanceof L.Marker || layer instanceof L.Circle || layer instanceof L.CircleMarker){
            map.removeLayer(layer);
        }
    });

    L.marker([latBase, lonBase]).addTo(map).bindPopup("Base");

    L.circle([latBase, lonBase], {
        radius: raio * 1000,
        color: "blue",
        fillOpacity: 0.1
    }).addTo(map);

    let linhas = document.getElementById("csv").value.split("\n");

    let proc=0, dentro=0, fora=0;

    for(let linha of linhas){

        if(!linha.trim()) continue;

        let p = linha.split(",");
        let nome = p[0];
        let email = p[1];
        let lat=null, lon=null;

        if(p.length >= 4){
            lat = parseFloat(p[2]);
            lon = parseFloat(p[3]);
        }

        if(!lat || !lon){
            let coord = await geocode(p[2]);
            if(coord){
                lat = coord[0];
                lon = coord[1];
            }
        }

        if(lat && lon){

            let dist = haversine(latBase, lonBase, lat, lon);
            let dentroRaio = dist <= raio;

            if(dentroRaio){
                dentro++;
                await enviarEmail(nome, email);
            } else {
                fora++;
            }

            // ✅ MARCADOR + TOOLTIP DEFINITIVO
            const marcador = L.circleMarker([lat, lon], {
                color: dentroRaio ? "green" : "red",
                radius: 6
            });

            marcador.addTo(map);

            marcador.bindTooltip(
                nome + " | " + dist.toFixed(2) + " km | " + (dentroRaio ? "Dentro" : "Fora")
            ).openTooltip();

            resultados.push({
                nome, email,
                dist: dist.toFixed(2),
                status: dentroRaio ? "Dentro" : "Fora"
            });

        } else {
            log("Erro localização: " + nome);
        }

        proc++;

        document.getElementById("proc").innerText = proc;
        document.getElementById("dentro").innerText = dentro;
        document.getElementById("fora").innerText = fora;
    }

    log("Finalizado.");
}

function gerarPDF(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let y = 10;
    doc.text("Relatório de Mobilização", 10, y);
    y+=10;

    resultados.forEach(r => {
        doc.text(`${r.nome} | ${r.email} | ${r.dist} km | ${r.status}`, 10, y);
        y+=7;
    });

    doc.save("relatorio.pdf");
}

</script>

</body>
</html>
