<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Sistema Operacional Definitivo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0}
#map{height:500px}
.controls{padding:10px;background:#f2f2f2}
textarea{width:100%;height:100px}
#log{background:#000;color:#00ff00;height:150px;overflow:auto;padding:10px;font-size:12px}
#painel{background:#111;color:#fff;padding:10px;font-weight:bold}
button{margin-top:5px}
</style>
</head>
<body>

<div class="controls">
<h2>Sistema Operacional Profissional</h2>

CEP Principal:<br>
<input type="text" id="cepPrincipal"><br>

Raio (km):<br>
<input type="number" id="raio" value="50"><br>

CSV (CEP,email):<br>
<textarea id="csv"></textarea><br>

<button onclick="iniciar()">Iniciar Operação</button>
<button onclick="gerarPDF()">Gerar Relatório</button>
</div>

<div id="painel">Aguardando...</div>
<div id="map"></div>
<div id="log"></div>

<script>

let dados;

function resetar(){
dados={
processados:0,
localizados:0,
dentro:0,
fora:0,
naoLocalizados:0,
convocados:[],
foraLista:[],
naoLista:[]
};
}

var map=L.map('map').setView([-15.78,-47.93],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let camada=L.layerGroup().addTo(map);
let circuloLayer=L.layerGroup().addTo(map);

function log(msg){
document.getElementById("log").innerHTML+=msg+"<br>";
}

function atualizar(){
document.getElementById("painel").innerHTML=
`Processados: ${dados.processados} |
Localizados: ${dados.localizados} |
Dentro: ${dados.dentro} |
Fora: ${dados.fora} |
Não Localizados: ${dados.naoLocalizados}`;
}

function icone(cor){
return L.divIcon({
className:'',
iconSize:[20,20],
html:`<div style="background:${cor};
width:18px;height:18px;
border-radius:50%;
border:2px solid white;"></div>`
});
}

async function geocode(endereco){
let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`);
let j=await r.json();
if(j.length>0){
return {lat:parseFloat(j[0].lat),lon:parseFloat(j[0].lon)};
}
return null;
}

async function localizar(cep){

let r=await fetch(`https://viacep.com.br/ws/${cep}/json/`);
let j=await r.json();

if(j.erro) return null;

let endereco=`${j.logradouro}, ${j.bairro}, ${j.localidade} - ${j.uf}, Brasil`;

return await geocode(endereco);
}

function distancia(a,b,c,d){
const R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

async function iniciar(){

resetar();
document.getElementById("log").innerHTML="";
camada.clearLayers();
circuloLayer.clearLayers();

let principalCEP=document.getElementById("cepPrincipal").value.trim();
let raio=parseFloat(document.getElementById("raio").value);
let linhas=document.getElementById("csv").value.trim().split("\n");

let principal=await localizar(principalCEP);

if(!principal){
log("CEP principal não localizado.");
return;
}

map.setView([principal.lat,principal.lon],12);

L.marker([principal.lat,principal.lon],{
icon:icone("blue"),
zIndexOffset:1000
}).addTo(camada);

L.circle([principal.lat,principal.lon],{
radius:raio*1000,
color:"blue",
fill:false
}).addTo(circuloLayer);

for(let linha of linhas){

if(!linha.includes(",")) continue;

dados.processados++;

let [cep,email]=linha.split(",");
cep=cep.trim();
email=email.trim();

let ponto=await localizar(cep);

if(!ponto){
dados.naoLocalizados++;
dados.naoLista.push(cep);
log(`❌ CEP não localizado: ${cep}`);
continue;
}

dados.localizados++;

let km=distancia(principal.lat,principal.lon,ponto.lat,ponto.lon);

if(km<=raio){
dados.dentro++;
dados.convocados.push(`${cep} - ${email}`);
L.marker([ponto.lat,ponto.lon],{
icon:icone("green")
}).addTo(camada);

log(`📨 Convocação enviada para ${email} referente ao CEP ${cep}`);
}else{
dados.fora++;
dados.foraLista.push(cep);

L.marker([ponto.lat,ponto.lon],{
icon:icone("red")
}).addTo(camada);

log(`⚠ CEP ${cep} fora do raio (${km.toFixed(1)} km)`);
}

}

atualizar();
log("Operação concluída.");
}

function gerarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("RELATÓRIO OPERACIONAL",10,15);
doc.text(`Processados: ${dados.processados}`,10,30);
doc.text(`Localizados: ${dados.localizados}`,10,36);
doc.text(`Dentro do raio: ${dados.dentro}`,10,42);
doc.text(`Fora do raio: ${dados.fora}`,10,48);
doc.text(`Não localizados: ${dados.naoLocalizados}`,10,54);

doc.save("relatorio_operacional.pdf");
}

resetar();
atualizar();

</script>
</body>
</html>
