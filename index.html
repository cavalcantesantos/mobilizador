<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Sistema Operacional Institucional</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script>

const ORS_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImZjNDJjYWM2ZDYxMzQxNjhiODgyMDQ0OGMzMWY5YWU1IiwiaCI6Im11cm11cjY0In0=";

class SistemaOperacional{

constructor(){
this.resetar();

this.map=L.map('map').setView([-15.79,-47.88],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(this.map);

this.camada=L.layerGroup().addTo(this.map);
}

resetar(){
this.dados={
processados:0,
geocodificados:0,
dentro:0,
fora:0,
erros:0
};

this.cacheCEP=JSON.parse(localStorage.getItem("cacheCEP")||"{}");
this.coordenadasUsadas={};
}

salvarCache(){
localStorage.setItem("cacheCEP",JSON.stringify(this.cacheCEP));
}

icone(cor){
return L.divIcon({
html:`<div style="background:${cor};width:14px;height:14px;border-radius:50%;border:2px solid white"></div>`
});
}

log(msg){
let l=document.createElement("div");
l.textContent=msg;
document.getElementById("log").appendChild(l);
}

async delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

// 📍 CEP → COORDENADA COM CACHE
async geocodificar(cep){

if(this.cacheCEP[cep]) return this.cacheCEP[cep];

try{
let url=`https://nominatim.openstreetmap.org/search?format=json&q=${cep},Brasil`;
let res=await fetch(url);
let data=await res.json();

if(data.length>0){
let coord={
lat:parseFloat(data[0].lat),
lon:parseFloat(data[0].lon)
};

this.cacheCEP[cep]=coord;
this.salvarCache();

return coord;
}

return null;

}catch{
return null;
}

}

// 🛣️ DISTÂNCIA REAL
async rota(base,destino){

try{
let res=await fetch(
`https://api.openrouteservice.org/v2/directions/driving-car`,
{
method:"POST",
headers:{
"Authorization":ORS_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
coordinates:[
[base.lon,base.lat],
[destino.lon,destino.lat]
]
})
}
);

let data=await res.json();

let dist=data.routes[0].summary.distance/1000;
let tempo=data.routes[0].summary.duration/60;

return{dist,tempo};

}catch{
return null;
}

}

atualizarKPIs(){
document.getElementById("kpiProcessados").textContent=this.dados.processados;
document.getElementById("kpiDentro").textContent=this.dados.dentro;
document.getElementById("kpiFora").textContent=this.dados.fora;
}

async iniciar(){

this.resetar();
this.camada.clearLayers();
document.getElementById("log").innerHTML="";

let latBase=parseFloat(document.getElementById("latBase").value);
let lonBase=parseFloat(document.getElementById("lonBase").value);
let raio=parseFloat(document.getElementById("raio").value);

let base={lat:latBase,lon:lonBase};

L.marker([base.lat,base.lon],{icon:this.icone("#007bff")}).addTo(this.camada);

let linhas=document.getElementById("csv").value.trim().split("\n");

for(let linha of linhas){

let p=linha.split(",");
if(p.length<2) continue;

let cep=p[0].trim();
let email=p[1].trim();
let lat=parseFloat(p[2]);
let lon=parseFloat(p[3]);

this.dados.processados++;

let coord=null;

// prioridade lat/lon
if(!isNaN(lat)&&!isNaN(lon)){
coord={lat,lon};
}else{
coord=await this.geocodificar(cep);
if(coord) this.dados.geocodificados++;
}

// erro total
if(!coord){
this.dados.erros++;
this.log(`ERRO: ${cep}`);
continue;
}

// rota real
let r=await this.rota(base,coord);

if(!r){
this.log(`ERRO ROTA: ${cep}`);
continue;
}

if(r.dist<=raio){
this.dados.dentro++;
L.marker([coord.lat,coord.lon],{icon:this.icone("#28a745")}).addTo(this.camada);
this.log(`DENTRO ${cep} (${r.dist.toFixed(1)} km)`);
}else{
this.dados.fora++;
L.marker([coord.lat,coord.lon],{icon:this.icone("#dc3545")}).addTo(this.camada);
this.log(`FORA ${cep} (${r.dist.toFixed(1)} km)`);
}

// controle anti-bloqueio
await this.delay(300);
}

this.atualizarKPIs();
this.log("FINALIZADO");

}

}

const sistema=new SistemaOperacional();

</script>
</body>
</html>
