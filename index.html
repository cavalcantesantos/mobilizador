<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Sistema Operacional Avançado - Brasil</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body { font-family: Arial; margin: 0; padding: 0; }
#map { height: 600px; }
.controls { padding: 10px; background: #f0f0f0; }
textarea { width: 100%; height: 80px; }
input { margin: 5px 0; }
#log { background: black; color: #00ff00; padding: 10px; height: 150px; overflow-y: scroll; font-size: 12px; }
</style>
</head>
<body>

<div class="controls">
<h2>Sistema Operacional Avançado - Brasil</h2>

<label>CEP Principal:</label><br>
<input type="text" id="cepPrincipal"><br>

<label>Raio (km):</label><br>
<input type="number" id="raio" value="50"><br>

<label>CSV (CEP,email):</label><br>
<textarea id="csv"></textarea><br>

<button onclick="iniciar()">Iniciar Operação</button>
</div>

<div id="map"></div>
<div id="log"></div>

<script>

var map = L.map('map').setView([-15.7801, -47.9292], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
}

function criarIcone(cor){
    return L.divIcon({
        className: '',
        html: `<div style="background:${cor};width:18px;height:18px;border-radius:50%;border:2px solid white;"></div>`
    });
}

async function geocode(endereco){
    let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;
    let res = await fetch(url);
    let data = await res.json();
    if(data.length > 0){
        return {
            lat: parseFloat(data[0].lat),
            lon: parseFloat(data[0].lon)
        };
    }
    return null;
}

async function localizarCEP(cep){

    log("Consultando ViaCEP: " + cep);

    let via = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    let dados = await via.json();

    if(dados.erro){
        log("CEP inválido: " + cep);
        return {status:"nao_localizado"};
    }

    let enderecoCompleto = "";

    if(dados.logradouro){
        enderecoCompleto = `${dados.logradouro}, ${dados.bairro}, ${dados.localidade} - ${dados.uf}, Brasil`;
    } else if(dados.bairro){
        enderecoCompleto = `${dados.bairro}, ${dados.localidade} - ${dados.uf}, Brasil`;
    } else {
        enderecoCompleto = `${dados.localidade} - ${dados.uf}, Brasil`;
    }

    log("Geocodificando: " + enderecoCompleto);

    let geo = await geocode(enderecoCompleto);

    if(geo){
        let aproximado = !dados.logradouro;
        return {
            lat: geo.lat,
            lon: geo.lon,
            status: aproximado ? "aproximado" : "exato",
            cidade: dados.localidade,
            uf: dados.uf
        };
    }

    log("Falha total no CEP: " + cep);
    return {status:"nao_localizado"};
}

function calcularDistancia(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

async function iniciar(){

    document.getElementById("log").innerHTML = "";

    let cepPrincipal = document.getElementById("cepPrincipal").value;
    let raio = parseFloat(document.getElementById("raio").value);
    let linhas = document.getElementById("csv").value.trim().split("\n");

    map.eachLayer(function(layer){
        if(layer instanceof L.Marker || layer instanceof L.Circle){
            map.removeLayer(layer);
        }
    });

    let principal = await localizarCEP(cepPrincipal);

    if(principal.status === "nao_localizado"){
        log("CEP Principal não localizado.");
        return;
    }

    let centro = [principal.lat, principal.lon];

    map.setView(centro, 10);

    L.marker(centro, {icon: criarIcone("blue")})
        .addTo(map)
        .bindPopup("CEP Principal");

    L.circle(centro, {radius: raio * 1000}).addTo(map);

    for(let linha of linhas){

        let partes = linha.split(",");
        let cep = partes[0].trim();
        let email = partes[1] ? partes[1].trim() : "";

        let ponto = await localizarCEP(cep);

        if(ponto.status === "nao_localizado"){
            log("CEP não localizado: " + cep);
            continue;
        }

        let distancia = calcularDistancia(
            principal.lat, principal.lon,
            ponto.lat, ponto.lon
        );

        let cor = "";
        let mensagem = "";

        if(distancia <= raio){
            if(ponto.status === "aproximado"){
                cor = "yellow";
            } else {
                cor = "green";
            }

            mensagem = "Você está sendo convocado. Apresente-se no ponto do CEP principal.";
            log("CONVOCADO → " + cep + " | " + distancia.toFixed(2) + " km");
            log("Mensagem enviada para " + email + ": " + mensagem);

        } else {
            cor = "red";
            log("Fora do raio → " + cep + " | " + distancia.toFixed(2) + " km");
        }

        L.marker([ponto.lat, ponto.lon], {icon: criarIcone(cor)})
            .addTo(map)
            .bindPopup(`CEP: ${cep}<br>${distancia.toFixed(2)} km`);
    }

    log("Operação concluída.");
}

</script>

</body>
</html>
