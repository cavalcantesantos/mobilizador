<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Sistema Operacional Público</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0}
#map{height:500px}
.controls{padding:10px;background:#f2f2f2}
textarea{width:100%;height:120px}
#painel{background:#111;color:#fff;padding:10px;font-weight:bold}
#log{background:#000;color:#00ff00;height:180px;overflow:auto;padding:10px;font-size:12px}
button{margin-top:5px}
input{margin-bottom:5px;width:100%}
</style>
</head>
<body>

<div class="controls">
<h2>Sistema Operacional Público</h2>

CEP Principal:<br>
<input type="text" id="cepPrincipal" placeholder="Ex: 70150-900"><br>

Latitude Base:<br>
<input type="number" id="latBase" step="0.000001" value="-15.793889"><br>

Longitude Base:<br>
<input type="number" id="lonBase" step="0.000001" value="-47.882778"><br>

Raio (km):<br>
<input type="number" id="raio" value="50"><br>

CSV (cep,email,lat,lon):<br>
<textarea id="csv"></textarea><br>

<button onclick="iniciar()">Iniciar Operação</button>
<button onclick="gerarPDF()">Gerar Relatório PDF</button>
</div>

<div id="painel">Aguardando...</div>
<div id="map"></div>
<div id="log"></div>

<script>

let dados;
let coordenadasUsadas = {};

function resetar(){
dados={
processados:0,
dentro:0,
fora:0,
convocados:[],
foraLista:[]
};
coordenadasUsadas={};
}

var map=L.map('map').setView([-15.79,-47.88],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let camada=L.layerGroup().addTo(map);

function icone(cor){
return L.divIcon({
className:'',
iconSize:[18,18],
html:`<div style="background:${cor};width:16px;height:16px;border-radius:50%;border:2px solid white"></div>`
});
}

function distancia(a,b,c,d){
const R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function log(msg){
document.getElementById("log").innerHTML+=msg+"<br>";
}

function atualizar(){
document.getElementById("painel").innerHTML=
`Processados: ${dados.processados} |
Dentro do raio: ${dados.dentro} |
Fora do raio: ${dados.fora}`;
}

function ajustarCoordenada(lat,lon){
let chave=lat+","+lon;
if(!coordenadasUsadas[chave]){
coordenadasUsadas[chave]=1;
return{lat,lon};
}else{
let offset=coordenadasUsadas[chave]*0.0005;
coordenadasUsadas[chave]++;
return{
lat:lat+offset,
lon:lon+offset
};
}
}

function iniciar(){

resetar();
document.getElementById("log").innerHTML="";
camada.clearLayers();

let cepPrincipal=document.getElementById("cepPrincipal").value || "NÃO INFORMADO";
let latBase=parseFloat(document.getElementById("latBase").value);
let lonBase=parseFloat(document.getElementById("lonBase").value);
let raio=parseFloat(document.getElementById("raio").value);

map.setView([latBase,lonBase],12);

L.marker([latBase,lonBase],{
icon:icone("blue"),
zIndexOffset:1000
}).addTo(camada);

L.circle([latBase,lonBase],{
radius:raio*1000,
color:"blue",
fill:false
}).addTo(camada);

let linhas=document.getElementById("csv").value.trim().split("\n");

for(let i=1;i<linhas.length;i++){

if(!linhas[i]) continue;

let partes=linhas[i].split(",");
if(partes.length<4) continue;

let cep=partes[0].trim();
let email=partes[1].trim();
let lat=parseFloat(partes[2]);
let lon=parseFloat(partes[3]);

dados.processados++;

let km=distancia(latBase,lonBase,lat,lon);
let ajustado=ajustarCoordenada(lat,lon);

if(km<=raio){
dados.dentro++;
let mensagem=`${email} (CEP ${cep}) → você está sendo convocado. Compareça no endereço do CEP principal (${cepPrincipal}) e mostre o CEP principal para referência.`;
dados.convocados.push(mensagem);
L.marker([ajustado.lat,ajustado.lon],{icon:icone("green")}).addTo(camada);
log("📨 "+mensagem);
}else{
dados.fora++;
dados.foraLista.push(cep);
L.marker([ajustado.lat,ajustado.lon],{icon:icone("red")}).addTo(camada);
log(`⚠ CEP ${cep} fora do raio`);
}

}

atualizar();
log("Operação concluída.");
}

function gerarPDF(){

const{jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.setFontSize(16);
doc.text("RELATÓRIO OPERACIONAL",10,15);

doc.setFontSize(11);
doc.text(`Processados: ${dados.processados}`,10,30);
doc.text(`Dentro do raio: ${dados.dentro}`,10,36);
doc.text(`Fora do raio: ${dados.fora}`,10,42);

let y=55;
doc.text("Convocados:",10,y);
y+=6;

dados.convocados.forEach(c=>{
doc.text("- "+c,10,y);
y+=6;
if(y>280){doc.addPage();y=20;}
});

doc.save("relatorio_operacional.pdf");
}

resetar();
atualizar();

</script>
</body>
</html>
